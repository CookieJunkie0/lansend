<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>LANShare</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="toolbar">
    <div class="toolbar-left">
      <div class="window-dots">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green" title="Show QR code to connect phones"></span>
      </div>
      <h1 class="title">LANShare</h1>
    </div>
    <div class="toolbar-right">
      <span class="connection-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span class="status-text">Waiting</span>
      </span>
    </div>
  </header>

  <div class="main-content">
    <div class="sidebar">
      <div class="sidebar-section">
        <h2 class="section-label">THIS DEVICE</h2>
        <div class="device-card active">
          <div class="device-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div class="device-info">
            <span class="device-name" id="myName">You</span>
            <span class="device-ip" id="myIP">—</span>
          </div>
          <button class="btn-rename" id="btnRename" title="Rename">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <h2 class="section-label">CONNECTED DEVICES</h2>
        <div class="device-list" id="deviceList">
          <div class="empty-state">No devices connected</div>
        </div>
      </div>

      <div class="sidebar-section">
        <h2 class="section-label">ENCRYPTION</h2>
        <div class="encryption-control">
          <input type="password" class="passphrase-input" id="passphrase" placeholder="Set a shared passphrase...">
          <span class="lock-status" id="lockStatus">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <span id="lockLabel">No key set</span>
          </span>
        </div>
      </div>
    </div>

    <div class="content-area">
      <div class="tab-bar">
        <button class="tab active" data-tab="text">Text</button>
        <button class="tab" data-tab="files">Files</button>
      </div>

      <div class="tab-content" id="tab-text">
        <div class="messages-container" id="messages">
          <div class="welcome-message">
            <div class="welcome-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
                <path d="M22 2L11 13"/>
                <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </div>
            <h3>Ready to share</h3>
            <p>Open this page on another device on the same network and set the same passphrase.</p>
          </div>
        </div>
        <div class="compose-bar">
          <textarea class="compose-input" id="textInput" placeholder="Type a message..." rows="1"></textarea>
          <button class="btn-send" id="btnSend" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-files">
        <div class="files-container" id="filesContainer">
          <div class="drop-zone" id="dropZone">
            <div class="drop-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17,8 12,3 7,8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <h3>Drop files here</h3>
            <p>or click to browse</p>
            <input type="file" class="file-input" id="fileInput" multiple>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="qr-overlay hidden" id="qrOverlay">
    <div class="qr-card">
      <h3>Connect to LANShare</h3>
      <div class="qr-code" id="qrCode"></div>
      <p class="qr-url" id="qrUrl"></p>
      <button class="btn-primary" id="btnCloseQr">Done</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
